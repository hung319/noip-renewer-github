name: noip-renewer-smart-matrix

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # JOB 1: Tự động tìm số lượng tài khoản (Quét 1-30)
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      count: ${{ steps.set-matrix.outputs.count }}
    steps:
      - id: set-matrix
        shell: bash
        run: |
          COUNT=0
          # Quét từ 1 đến 30 để tìm số thứ tự lớn nhất có Secret
          for i in {1..30}; do
            # Sử dụng biến động từ GitHub Context
            USER_SECRET='${{ secrets[format('NO_IP_USERNAME_{0}', count)] }}' # Đây là lừa GitHub để lấy context
            # Cách thực tế: Kiểm tra trực tiếp qua env giả lập của GitHub
            if [ -n "${{ secrets[format('NO_IP_USERNAME_{0}', i)] }}" ]; then
              COUNT=$i
            fi
          done

          if [ "$COUNT" -eq 0 ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
            echo "count=0" >> $GITHUB_OUTPUT
          else
            # Tạo mảng JSON gọn nhẹ [1,2,3,4,5]
            MATRIX=$(seq 1 $COUNT | jq -R . | jq -s -c .)
            echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            echo "Tìm thấy $COUNT tài khoản."
          fi

  # JOB 2: Chạy Matrix dựa trên số lượng đã tìm thấy
  noip-renewer:
    needs: setup-matrix
    if: needs.setup-matrix.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        index: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    
    steps:
      - name: Process Account ${{ matrix.index }}
        env:
          # Lấy thông tin tài khoản đúng theo index của máy ảo này
          USER: ${{ secrets[format('NO_IP_USERNAME_{0}', matrix.index)] }}
          PASS: ${{ secrets[format('NO_IP_PASSWORD_{0}', matrix.index)] }}
          TOTP: ${{ secrets[format('NO_IP_TOTP_KEY_{0}', matrix.index)] }}
        run: |
          if [ -z "$USER" ]; then
            echo "Acc ${{ matrix.index }} không có dữ liệu, bỏ qua."
            exit 0
          fi
          
          docker run --rm \
            --env NO_IP_USERNAME="$USER" \
            --env NO_IP_PASSWORD="$PASS" \
            --env NO_IP_TOTP_KEY="$TOTP" \
            simaofsilva/noip-renewer:latest
          
      - name: Create Status File
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "✅ Acc ${{ matrix.index }}: THÀNH CÔNG" > status_${{ matrix.index }}.txt
          else
            echo "❌ Acc ${{ matrix.index }}: THẤT BẠI (Kiểm tra Log)" > status_${{ matrix.index }}.txt
          fi

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-${{ matrix.index }}
          path: status_${{ matrix.index }}.txt
          retention-days: 1

  # JOB 3: Tổng hợp báo cáo và dọn dẹp Artifact
  summary:
    needs: noip-renewer
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: all_statuses
          pattern: status-*
          merge-multiple: true

      - name: Create Final Report
        run: |
          DATE=$(TZ="Asia/Ho_Chi_Minh" date +"%Y-%m-%d %H:%M:%S")
          echo "📊 BÁO CÁO GIA HẠN NO-IP" > noip_renewer_status.txt
          echo "Cập nhật lúc: $DATE (Giờ VN)" >> noip_renewer_status.txt
          echo "-----------------------------------" >> noip_renewer_status.txt
          
          if [ -d "all_statuses" ] && [ "$(ls -A all_statuses)" ]; then
            ls all_statuses/status_*.txt | sort -V | xargs cat >> noip_renewer_status.txt
          else
            echo "Không có tài khoản nào được xử lý." >> noip_renewer_status.txt
          fi

      - name: Push Report
        run: |
          git config --global user.name "GitHub Bot"
          git config --global user.email "bot@github.com"
          git add noip_renewer_status.txt
          git commit -m "chore: update report [skip ci]" || exit 0
          git push origin ${{ github.ref_name }}

      - name: Delete Artifacts
        if: always()
        uses: geekyeggo/delete-artifact@v5
        with:
            name: status-*
