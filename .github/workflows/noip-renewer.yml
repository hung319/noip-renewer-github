name: noip-renewer-smart-matrix

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # JOB 1: Tự động đếm số lượng tài khoản thực tế dựa trên Secret
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      count: ${{ steps.set-matrix.outputs.count }}
    steps:
      - id: set-matrix
        env:
          # Truyền tất cả secrets vào để đếm (tối đa quét đến 30)
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          # Dùng regex để tìm các secret có dạng NO_IP_USERNAME_X và lấy số X lớn nhất
          COUNT=$(echo '$SECRETS_JSON' | jq -r 'keys[]' | grep -E '^NO_IP_USERNAME_[0-9]+' | sed 's/NO_IP_USERNAME_//' | sort -rn | head -n 1)
          
          # Nếu không tìm thấy secret nào, mặc định là 0
          if [ -z "$COUNT" ]; then COUNT=0; fi
          
          # Tạo mảng matrix thực tế (ví dụ: [1, 2, 3, 4, 5])
          if [ "$COUNT" -gt 0 ]; then
            MATRIX=$(seq 1 $COUNT | jq -R . | jq -s -c .)
          else
            MATRIX="[]"
          fi
          
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Phát hiện $COUNT tài khoản cấu hình."

  # JOB 2: Chỉ chạy đúng số lượng job đã phát hiện
  noip-renewer:
    needs: setup-matrix
    if: needs.setup-matrix.outputs.count > 0
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        index: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    
    steps:
      - name: Process Account ${{ matrix.index }}
        id: run_step
        run: |
          docker run --rm \
            --env NO_IP_USERNAME="${{ secrets[format('NO_IP_USERNAME_{0}', matrix.index)] }}" \
            --env NO_IP_PASSWORD="${{ secrets[format('NO_IP_PASSWORD_{0}', matrix.index)] }}" \
            --env NO_IP_TOTP_KEY="${{ secrets[format('NO_IP_TOTP_KEY_{0}', matrix.index)] }}" \
            simaofsilva/noip-renewer:latest
          
      - name: Create Status File
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "✅ Acc ${{ matrix.index }}: THÀNH CÔNG" > status_${{ matrix.index }}.txt
          else
            echo "❌ Acc ${{ matrix.index }}: THẤT BẠI (Kiểm tra Log)" > status_${{ matrix.index }}.txt
          fi

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-${{ matrix.index }}
          path: status_${{ matrix.index }}.txt
          retention-days: 1

  # JOB 3: Tổng hợp báo cáo và XÓA Artifact
  summary:
    needs: noip-renewer
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: all_statuses
          pattern: status-*
          merge-multiple: true

      - name: Create Final Report
        run: |
          DATE=$(TZ="Asia/Ho_Chi_Minh" date +"%Y-%m-%d %H:%M:%S")
          echo "📊 BÁO CÁO GIA HẠN NO-IP" > noip_renewer_status.txt
          echo "Cập nhật lúc: $DATE (Giờ VN)" >> noip_renewer_status.txt
          echo "-----------------------------------" >> noip_renewer_status.txt
          
          if [ -d "all_statuses" ]; then
            ls all_statuses/status_*.txt | sort -V | xargs cat >> noip_renewer_status.txt
          else
            echo "Không có dữ liệu tài khoản." >> noip_renewer_status.txt
          fi
          
          echo "-----------------------------------" >> noip_renewer_status.txt
          echo "Chi tiết log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> noip_renewer_status.txt

      - name: Push Report to Repo
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add noip_renewer_status.txt
          git commit -m "chore: cập nhật báo cáo no-ip [skip ci]" || exit 0
          git push origin ${{ github.ref_name }}

      - name: Delete Artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
            name: status-* # Xóa tất cả các file status tạm sau khi đã gộp xong
