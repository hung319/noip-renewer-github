name: noip-renewer

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # JOB 1: Chỉ lấy những ID có ĐỦ cả Username và Password
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      count: ${{ steps.set-matrix.outputs.count }}
    steps:
      - id: set-matrix
        shell: bash
        run: |
          # Lấy danh sách Keys từ Secrets
          ALL_KEYS=$(echo '${{ toJson(secrets) }}' | jq -r 'keys[]')
          
          # 1. Lấy danh sách ID có Username
          USER_IDS=$(echo "$ALL_KEYS" | grep -E '^NO_IP_USERNAME_[0-9]+' | sed 's/NO_IP_USERNAME_//' | sort -n)
          
          # 2. Lấy danh sách ID có Password
          PASS_IDS=$(echo "$ALL_KEYS" | grep -E '^NO_IP_PASSWORD_[0-9]+' | sed 's/NO_IP_PASSWORD_//' | sort -n)
          
          # 3. Tìm giao điểm (chỉ lấy những ID xuất hiện ở cả 2 danh sách)
          VALID_IDS=$(comm -12 <(echo "$USER_IDS") <(echo "$PASS_IDS"))
          
          if [ -z "$VALID_IDS" ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
            echo "count=0" >> $GITHUB_OUTPUT
            echo "Không tìm thấy cặp tài khoản hợp lệ nào."
          else
            # Biến danh sách ID thành mảng JSON [1, 2, 5...]
            MATRIX_JSON=$(echo "$VALID_IDS" | jq -R . | jq -s -c .)
            COUNT=$(echo "$VALID_IDS" | wc -l)
            echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            echo "Phát hiện $COUNT tài khoản hợp lệ: $VALID_IDS"
          fi

  # JOB 2: Chạy Matrix (Chỉ những ID hợp lệ mới được khởi tạo máy ảo)
  noip-renewer:
    needs: setup-matrix
    if: needs.setup-matrix.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        index: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    
    steps:
      - name: Process Account ${{ matrix.index }}
        env:
          USER: ${{ secrets[format('NO_IP_USERNAME_{0}', matrix.index)] }}
          PASS: ${{ secrets[format('NO_IP_PASSWORD_{0}', matrix.index)] }}
          TOTP: ${{ secrets[format('NO_IP_TOTP_KEY_{0}', matrix.index)] }}
        run: |
          echo "🚀 Đang gia hạn cho Acc ${{ matrix.index }}: $USER"
          
          # Lệnh Docker chuẩn
          DOCKER_CMD="docker run --rm -e NO_IP_USERNAME='$USER' -e NO_IP_PASSWORD='$PASS' -e TRANSLATE_ENABLED=false"
          
          # Thêm OTP nếu có
          if [ -n "$TOTP" ]; then
            DOCKER_CMD="$DOCKER_CMD -e NO_IP_TOTP_KEY='$TOTP'"
          fi
          
          eval "$DOCKER_CMD simaofsilva/noip-renewer:latest"
          
      - name: Create Status File
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "✅ Acc ${{ matrix.index }}: THÀNH CÔNG" > status_${{ matrix.index }}.txt
          else
            echo "❌ Acc ${{ matrix.index }}: THẤT BẠI" > status_${{ matrix.index }}.txt
          fi

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-${{ matrix.index }}
          path: status_${{ matrix.index }}.txt
          retention-days: 1

  # JOB 3: Tổng hợp báo cáo
  summary:
    needs: noip-renewer
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download reports
        uses: actions/download-artifact@v4
        with:
          path: all_statuses
          pattern: status-*
          merge-multiple: true
      - name: Final Report
        run: |
          DATE=$(TZ="Asia/Ho_Chi_Minh" date +"%d/%m/%Y %H:%M:%S")
          echo "📊 BÁO CÁO GIA HẠN NO-IP" > noip_renewer_status.txt
          echo "Cập nhật lúc: $DATE (Giờ VN)" >> noip_renewer_status.txt
          echo "-----------------------------------" >> noip_renewer_status.txt
          if [ -d "all_statuses" ]; then
             ls all_statuses/status_*.txt | sort -V | xargs cat >> noip_renewer_status.txt
          fi
      - name: Push Report
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add noip_renewer_status.txt
          git commit -m "update report [skip ci]" || exit 0
          git push origin ${{ github.ref_name }}
      - name: Delete Artifacts
        if: always()
        uses: geekyeggo/delete-artifact@v5
        with:
            name: status-*
